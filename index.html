<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة راف الاحترافية</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e293b; padding: 10px; border-radius: 12px; transition: 0.3s; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .card:hover { transform: scale(1.05); background: #334155; }
    </style>
</head>
<body>
    <h1>🎮 مكتبة راف الاحترافية</h1>
    <div class="grid" id="gameGrid"></div>

    <script>
        // هنا بس ضيف أي اسم لعبة تبيه، والجهاز بيجيب صورتها لحاله!
        const games = ["GTA V", "Fortnite", "Batman Arkham Knight", "Minecraft", "Elden Ring", "Cyberpunk 2077", "Tekken 8", "God of War", "Red Dead Redemption 2", "Valorant"];
        
        const grid = document.getElementById('gameGrid');

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
            // هذا الرابط يجيب صورة اللعبة تلقائياً باسمها
            card.innerHTML = `
                <img src="https://source.unsplash.com/400x300/?${game}" alt="${game}">
                <h3>${game}</h3>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
