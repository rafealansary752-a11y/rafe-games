<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة راف الرسمية</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        #searchInput { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: none; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid #334155; }
        .card:hover { background: #334155; transform: scale(1.05); }
        #detailPage { display: none; padding: 40px; background: #0f172a; position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; }
        .btn { display: block; width: 250px; margin: 15px auto; padding: 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; }
        .btn-steam { background: #1b2838; border: 1px solid #66c0f4; }
        .btn-epic { background: #2a2a2a; border: 1px solid #ffffff; }
    </style>
</head>
<body>
    <h1>🎮 مكتبة راف الرسمية</h1>
    <input type="text" id="searchInput" placeholder="ابحث عن لعبتك...">
    <div class="grid" id="gameGrid"></div>

    <div id="detailPage">
        <button onclick="document.getElementById('detailPage').style.display='none'" style="padding:10px 20px;">⬅️ إغلاق</button>
        <h1 id="gameTitle"></h1>
        <a id="steamLink" href="#" class="btn btn-steam" target="_blank">متجر Steam</a>
        <a id="epicLink" href="#" class="btn btn-epic" target="_blank">متجر Epic Games</a>
    </div>

    <script>
        const games = [
            { name: "GTA V", steam: "https://store.steampowered.com/app/271590/", epic: "https://store.epicgames.com/p/grand-theft-auto-v" },
            { name: "Fortnite", steam: "#", epic: "https://store.epicgames.com/p/fortnite" },
            { name: "Elden Ring", steam: "https://store.steampowered.com/app/1245620/", epic: "#" },
            { name: "Cyberpunk 2077", steam: "https://store.steampowered.com/app/1091500/", epic: "https://store.epicgames.com/p/cyberpunk-2077" },
            { name: "Red Dead Redemption 2", steam: "https://store.steampowered.com/app/1174180/", epic: "https://store.epicgames.com/p/red-dead-redemption-2" },
            { name: "Minecraft", steam: "#", epic: "#" },
            { name: "Valorant", steam: "#", epic: "#" },
            { name: "The Witcher 3", steam: "https://store.steampowered.com/app/292030/", epic: "https://store.epicgames.com/p/the-witcher-3-wild-hunt" }
            // يمكنك إضافة الـ 300 لعبة هنا بنفس الطريقة..
        ];

        const grid = document.getElementById('gameGrid');
        const searchInput = document.getElementById('searchInput');

        function render(filter = "") {
            grid.innerHTML = "";
            games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${game.name}</h3>`;
                card.onclick = () => {
                    document.getElementById('gameTitle').innerText = game.name;
                    document.getElementById('steamLink').href = game.steam;
                    document.getElementById('epicLink').href = game.epic;
                    document.getElementById('detailPage').style.display = 'block';
                };
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
</html>
