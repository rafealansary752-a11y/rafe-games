<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة راف للألعاب</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 40px; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; text-decoration: none; color: white; transition: 0.3s; border: 2px solid #334155; }
        .card:hover { transform: scale(1.05); border-color: #38bdf8; background: #334155; }
        .icon { font-size: 40px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <h1>🎮 مكتبة راف للألعاب</h1>
    <div class="grid">
        <a href="batman.html" class="card"><span class="icon">🦇</span>باتمان</a>
        <a href="fortnite.html" class="card"><span class="icon">🔫</span>فورتنايت</a>
    </div>
</body>
</html>
