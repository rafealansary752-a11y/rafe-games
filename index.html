<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة ألعاب راف - 200 لعبة</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        h1 { margin-bottom: 20px; }
        #searchInput { width: 90%; max-width: 400px; padding: 12px; margin: 20px auto; display: block; border-radius: 15px; border: none; text-align: center; font-size: 16px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 8px; transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: scale(1.05); background: #334155; }
    </style>
</head>
<body>
    <h1>🎮 مكتبة ألعاب راف</h1>
    <input type="text" id="searchInput" placeholder="ابحث عن اسم اللعبة...">
    
    <div class="grid" id="gameGrid">
        <!-- 200 لعبة حقيقية -->
        <script>
            const games = ["Counter-Strike 2", "Dota 2", "PUBG", "Apex Legends", "Elden Ring", "Baldur's Gate 3", "Cyberpunk 2077", "GTA V", "Rust", "Team Fortress 2", "The Witcher 3", "Terraria", "Stardew Valley", "Rainbow Six Siege", "Warframe", "Destiny 2", "Left 4 Dead 2", "Skyrim", "Fallout 4", "Garry's Mod", "Portal 2", "Half-Life 2", "RDR 2", "Monster Hunter: World", "Phasmophobia", "Dead by Daylight", "Valheim", "Hollow Knight", "Don't Starve Together", "DayZ", "ARK: Survival Evolved", "No Man's Sky", "Sea of Thieves", "Cities: Skylines", "Factorio", "RimWorld", "Satisfactory", "Among Us", "Fall Guys", "Rocket League", "Euro Truck Simulator 2", "American Truck Simulator", "Hearts of Iron IV", "Europa Universalis IV", "Stellaris", "Civilization VI", "Total War: Warhammer III", "Bannerlord", "Forza Horizon 5", "Assetto Corsa", "BeamNG.drive", "Subnautica", "The Forest", "Sons of the Forest", "Terraria", "Dishonored", "Bioshock Infinite", "Mass Effect Legendary", "Dragon Age: Inquisition", "Borderlands 3", "Doom Eternal", "Sekiro", "Dark Souls III", "Nier: Automata", "Control", "Death Stranding", "Resident Evil Village", "Devil May Cry 5", "Hades", "Dead Cells", "Celeste", "Cuphead", "Undertale", "Outer Wilds", "Disco Elysium", "Stray", "It Takes Two", "Overcooked! 2", "Keep Talking and Nobody Explodes", "Portal", "Half-Life: Alyx", "Black Mesa", "F1 23", "FIFA 24", "NBA 2K24", "WWE 2K23", "Street Fighter 6", "Tekken 8", "Mortal Kombat 1", "Injustice 2", "Batman: Arkham Knight", "Batman: Arkham City", "Batman: Arkham Asylum", "Middle-earth: Shadow of Mordor", "Mad Max", "Sleeping Dogs", "Yakuza: Like a Dragon", "Persona 5 Royal", "Final Fantasy XV", "Tales of Arise", "Scarlet Nexus", "Code Vein", "Grim Dawn", "Torchlight II", "Titan Quest", "Path of Exile", "Lost Ark", "Naraka: Bladepoint", "Hunt: Showdown", "Escape from Tarkov", "Squad", "Hell Let Loose", "Post Scriptum", "Rising Storm 2: Vietnam", "Insurgency: Sandstorm", "World War Z", "Back 4 Blood", "Deep Rock Galactic", "Killing Floor 2", "Payday 2", "Payday 3", "Phantasy Star Online 2", "War Thunder", "World of Tanks", "World of Warships", "Star Citizen", "Elite Dangerous", "X4: Foundations", "Kerbal Space Program", "Space Engineers", "Teardown", "Besiege", "Poly Bridge", "Human Fall Flat", "Gang Beasts", "Totally Accurate Battle Simulator", "Superhot", "Hotline Miami", "Katana ZERO", "My Friend Pedro", "Ghostrunner", "Metal Gear Solid V", "Hitman 3", "Watch Dogs 2", "Far Cry 5", "Assassin's Creed Odyssey", "Assassin's Creed Origins", "Ghost Recon Wildlands", "Tom Clancy's The Division 2", "Just Cause 4", "Saints Row IV", "Mafia: Definitive Edition", "L.A. Noire", "Max Payne 3", "Alan Wake 2", "Control Ultimate Edition", "Quantum Break", "Ghostwire: Tokyo", "Deathloop", "Prey", "Dishonored 2", "Wolfenstein II", "DOOM (2016)", "Quake Champions", "Unreal Tournament", "Serious Sam 4", "Painkiller", "Shadow Warrior 3", "Bulletstorm", "Dying Light", "Dying Light 2", "Dead Island 2", "Days Gone", "State of Decay 2", "Project Zomboid", "7 Days to Die", "Green Hell", "Stranded Deep", "Raft", "The Long Dark", "Firewatch", "What Remains of Edith Finch", "Gone Home", "Tacoma", "Return of the Obra Dinn", "Baba Is You", "Slay the Spire", "Inscryption"];
            const grid = document.getElementById('gameGrid');
            games.forEach(game => {
                const div = document.createElement('div');
                div.className = 'card';
                div.textContent = game;
                grid.appendChild(div);
            });
        </script>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(filter) ? "" : "none";
            });
        });
    </script>
</body>
</html>
