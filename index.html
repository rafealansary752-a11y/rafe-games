<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة راف الرسمية - 200 لعبة</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        #searchInput { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: none; text-align: center; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; cursor: pointer; border: 1px solid #334155; }
        .card:hover { background: #334155; transform: scale(1.03); }
        #detailPage { display: none; padding: 40px; background: #0f172a; position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; }
        .btn { display: block; width: 250px; margin: 15px auto; padding: 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; }
        .btn-steam { background: #1b2838; border: 1px solid #66c0f4; }
        .btn-epic { background: #2a2a2a; border: 1px solid #ffffff; }
    </style>
</head>
<body>
    <h1>🎮 مكتبة راف الرسمية</h1>
    <input type="text" id="searchInput" placeholder="ابحث بين 200 لعبة...">
    <div class="grid" id="gameGrid"></div>

    <div id="detailPage">
        <button onclick="document.getElementById('detailPage').style.display='none'" style="padding:10px 20px; cursor:pointer;">⬅️ إغلاق</button>
        <h1 id="gameTitle"></h1>
        <a id="steamLink" href="#" class="btn btn-steam" style="display:none" target="_blank">متجر Steam</a>
        <a id="epicLink" href="#" class="btn btn-epic" style="display:none" target="_blank">متجر Epic Games</a>
    </div>

    <script>
        const games = [
            // ... (تم اختصار القائمة هنا، انسخ القائمة كاملة من الرابط أدناه)
            { name: "GTA V", steam: "https://store.steampowered.com/app/271590/", epic: "https://store.epicgames.com/p/grand-theft-auto-v" },
            { name: "Elden Ring", steam: "https://store.steampowered.com/app/1245620/", epic: null },
            // أضف هنا الـ 200 لعبة بنفس الطريقة..
            { name: "Cyberpunk 2077", steam: "https://store.steampowered.com/app/1091500/", epic: "https://store.epicgames.com/p/cyberpunk-2077" }
        ];
        
        // ... (باقي كود البرمجة كما هو في الأعلى)
        const grid = document.getElementById('gameGrid');
        const searchInput = document.getElementById('searchInput');

        function render(filter = "") {
            grid.innerHTML = "";
            games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${game.name}</h3>`;
                card.onclick = () => {
                    document.getElementById('gameTitle').innerText = game.name;
                    const sBtn = document.getElementById('steamLink');
                    const eBtn = document.getElementById('epicLink');
                    if(game.steam) { sBtn.href = game.steam; sBtn.style.display = 'block'; } else { sBtn.style.display = 'none'; }
                    if(game.epic) { eBtn.href = game.epic; eBtn.style.display = 'block'; } else { eBtn.style.display = 'none'; }
                    document.getElementById('detailPage').style.display = 'block';
                };
                grid.appendChild(card);
            });
        }
        searchInput.addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
</html>
