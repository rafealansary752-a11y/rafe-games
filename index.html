<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة راف للألعاب</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        h1 { margin-bottom: 20px; }
        #searchInput { width: 90%; max-width: 400px; padding: 12px; margin: 20px auto; display: block; border-radius: 15px; border: none; text-align: center; font-size: 16px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>🎮 مكتبة راف للألعاب</h1>
    <input type="text" id="searchInput" placeholder="ابحث عن لعبتك هنا...">
    
    <div class="grid">
        <div class="card">فورتنايت</div>
        <div class="card">باتمان</div>
    </div>
</body>
</html>
