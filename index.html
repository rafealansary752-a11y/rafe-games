<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة راف الاحترافية</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        #searchInput { width: 90%; max-width: 400px; padding: 12px; margin: 20px auto; border-radius: 15px; border: none; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>🎮 مكتبة راف الاحترافية</h1>
    <input type="text" id="searchInput" placeholder="ابحث عن اسم اللعبة...">
    
    <div class="grid" id="gameGrid">
        <!-- أضف ألعابك هنا (كل لعبة في سطر card) -->
        <div class="card"><h3>GTA V</h3></div>
        <div class="card"><h3>Fortnite</h3></div>
        <div class="card"><h3>Minecraft</h3></div>
        <div class="card"><h3>Batman Arkham Knight</h3></div>
        <div class="card"><h3>Red Dead Redemption 2</h3></div>
        <div class="card"><h3>Valorant</h3></div>
        <div class="card"><h3>Elden Ring</h3></div>
        <div class="card"><h3>Cyberpunk 2077</h3></div>
    </div>

    <script>
        // كود البحث
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(filter) ? "" : "none";
            });
        });
    </script>
</body>
</html>
